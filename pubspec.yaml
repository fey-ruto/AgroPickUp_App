name: agro_pickgh
description: AgroPickup GH - Mobile Application for Produce Collection and Pickup Coordination
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0
  provider: ^6.1.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  sqflite: ^2.3.2
  path: ^1.9.0
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  flutter_local_notifications: ^17.0.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
